<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#ffffff">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="文案工作台">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <title>小红书文案工作台</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --line: #e3e6eb;
      --line-strong: #ccd1d9;
      --text: #17191d;
      --muted: #667085;
      --primary: #ff2442;
      --primary-dark: #df1f39;
      --primary-soft: #fff0f2;
      --green: #157a55;
      --green-soft: #e9f8f1;
      --blue: #2563eb;
      --blue-soft: #eef4ff;
      --amber: #a15c00;
      --amber-soft: #fff7e6;
      --danger: #b42318;
      --radius: 8px;
      --shadow: 0 10px 28px rgba(17, 24, 39, 0.07);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    [contenteditable="true"]:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.22);
      outline-offset: 1px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      width: min(1420px, calc(100% - 32px));
      min-height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      min-width: 228px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 7px;
      background: var(--primary);
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
    }

    .brand-copy {
      line-height: 1.2;
    }

    .brand-copy small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .mode-switch {
      height: 38px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .mode-switch button {
      min-width: 104px;
      padding: 0 14px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .mode-switch button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(17, 24, 39, 0.1);
    }

    .top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .local-status {
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border-radius: 7px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .top-button,
    .text-button,
    .mini-button,
    .copy-button {
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .top-button:hover,
    .text-button:hover,
    .mini-button:hover {
      border-color: var(--line-strong);
      background: var(--surface-soft);
    }

    .app-shell {
      width: min(1420px, calc(100% - 32px));
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: minmax(330px, 0.82fr) minmax(0, 1.25fr);
      gap: 20px;
      align-items: start;
    }

    .input-panel {
      position: sticky;
      top: 84px;
      max-height: calc(100dvh - 104px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      scrollbar-width: thin;
    }

    .panel-head,
    .results-head,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-head {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
    }

    .panel-head h1,
    .results-head h1,
    .section-head h2 {
      margin: 0;
      letter-spacing: 0;
    }

    .panel-head h1,
    .results-head h1 {
      font-size: 19px;
    }

    .section-head h2 {
      font-size: 16px;
    }

    .form-body {
      padding: 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label,
    .field-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      color: #344054;
      font-size: 13px;
      font-weight: 750;
    }

    .optional {
      color: #98a2b3;
      font-size: 11px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    input,
    select {
      min-height: 42px;
      padding: 0 11px;
    }

    textarea {
      min-height: 84px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.6;
    }

    input:hover,
    select:hover,
    textarea:hover {
      border-color: #aeb5c0;
    }

    input[aria-invalid="true"] {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.1);
    }

    ::placeholder {
      color: #a0a7b2;
    }

    .error {
      display: none;
      margin-top: 6px;
      color: var(--danger);
      font-size: 12px;
    }

    .error.show {
      display: block;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: #475467;
      font-size: 12px;
      font-weight: 700;
    }

    .chip.active {
      border-color: rgba(255, 36, 66, 0.35);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .switch-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .check-row {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-soft);
      color: #475467;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
    }

    .check-row input {
      width: 17px;
      min-height: 17px;
      height: 17px;
      margin: 0;
      accent-color: var(--primary);
    }

    .form-actions {
      position: sticky;
      bottom: 0;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
    }

    .primary-button {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 7px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 800;
    }

    .primary-button:hover {
      background: var(--primary-dark);
    }

    .secondary-button {
      min-height: 44px;
      padding: 0 15px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--surface);
      color: #344054;
      font-weight: 750;
    }

    .results-area {
      min-width: 0;
    }

    .results-head {
      min-height: 48px;
      margin-bottom: 12px;
    }

    .result-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .mini-button.primary {
      border-color: rgba(255, 36, 66, 0.28);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .privacy-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid #cdebdc;
      border-radius: 7px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 650;
    }

    .output-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .output-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 5px 18px rgba(17, 24, 39, 0.045);
    }

    .output-card.wide {
      grid-column: 1 / -1;
    }

    .output-card.primary-output {
      border-top: 3px solid var(--primary);
    }

    .output-card.primary-output .card-head {
      background: var(--primary-soft);
    }

    .output-card.primary-output .output-content {
      min-height: 360px;
      max-height: 620px;
    }

    .card-head {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 13px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .card-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .edit-hint {
      margin-left: 6px;
      color: #98a2b3;
      font-size: 10px;
      font-weight: 600;
    }

    .copy-button {
      border-color: #cfe0ff;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .output-content {
      min-height: 138px;
      max-height: 330px;
      overflow: auto;
      padding: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #273142;
      font-size: 14px;
      line-height: 1.72;
    }

    .output-card.wide .output-content {
      min-height: 260px;
      max-height: 500px;
    }

    .output-content.placeholder {
      color: #98a2b3;
    }

    .history-section {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--line-strong);
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .history-item {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
    }

    .history-item strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .history-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .history-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .history-actions button {
      min-height: 32px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: #475467;
      font-size: 11px;
      font-weight: 700;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 18px;
      border: 1px dashed var(--line-strong);
      border-radius: 7px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .mobile-action {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 50;
      min-width: 220px;
      max-width: calc(100% - 32px);
      padding: 11px 15px;
      border-radius: 8px;
      background: #111827;
      color: #ffffff;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .topbar {
        position: relative;
      }

      .topbar-inner {
        flex-wrap: wrap;
        padding: 12px 0;
      }

      .brand {
        min-width: 0;
      }

      .mode-switch {
        order: 3;
        width: 100%;
      }

      .mode-switch button {
        min-width: 0;
      }

      .app-shell {
        grid-template-columns: minmax(310px, 0.78fr) minmax(0, 1fr);
      }

      .input-panel {
        top: 20px;
        max-height: calc(100dvh - 40px);
      }

      .output-grid,
      .history-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      body {
        padding-bottom: calc(72px + env(safe-area-inset-bottom));
      }

      .topbar {
        position: relative;
      }

      .topbar-inner,
      .app-shell {
        width: min(100% - 24px, 720px);
      }

      .top-actions .local-status,
      .top-actions [data-export] {
        display: none;
      }

      .app-shell {
        margin-top: 12px;
        grid-template-columns: 1fr;
      }

      .input-panel {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .panel-head,
      .form-actions {
        position: static;
      }

      .results-head {
        align-items: flex-start;
      }

      .toolbar {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .mobile-action {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
      }

      .toast {
        bottom: calc(82px + env(safe-area-inset-bottom));
      }

      body.keyboard-open .mobile-action {
        display: none;
      }

      body.keyboard-open .toast {
        bottom: 18px;
      }
    }

    @media (max-width: 540px) {
      .brand-copy small {
        display: none;
      }

      .top-actions {
        gap: 4px;
      }

      .top-button {
        padding: 0 9px;
      }

      .field-row,
      .switch-list,
      .form-actions {
        grid-template-columns: 1fr;
      }

      input,
      select,
      textarea {
        font-size: 16px;
      }

      .output-card.wide .output-content,
      .output-content {
        min-height: 120px;
        max-height: none;
      }

      .results-head {
        display: block;
      }

      .toolbar {
        margin-top: 10px;
        justify-content: flex-start;
      }

      .edit-hint {
        display: none;
      }
    }

    @media (display-mode: standalone) {
      .topbar {
        padding-top: env(safe-area-inset-top);
      }
    }

    @supports (-webkit-touch-callout: none) {
      .input-panel,
      .output-content {
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">文</div>
        <div class="brand-copy">
          小红书文案工作台
          <small>V5 小红书完整笔记</small>
        </div>
      </div>

      <div class="mode-switch" role="tablist" aria-label="文案模式">
        <button class="active" type="button" role="tab" aria-selected="true" data-mode="rednote">小红书笔记</button>
        <button type="button" role="tab" aria-selected="false" data-mode="xianyu">闲鱼卖货</button>
      </div>

      <div class="top-actions">
        <span class="local-status"><span class="status-dot"></span>本地运行</span>
        <button class="top-button" type="button" data-scroll="#history">历史</button>
        <button class="top-button" type="button" data-share-app>分享网址</button>
        <button class="top-button" type="button" data-export>导出</button>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <form class="input-panel" id="copyForm">
      <div class="panel-head">
        <h1>输入素材</h1>
        <button class="text-button" type="button" data-clear>清空</button>
      </div>

      <div class="form-body">
        <div class="field">
          <div class="field-label">内容赛道</div>
          <div class="chips" id="categoryChips">
            <button class="chip active" type="button" data-category="AI工具">AI工具</button>
            <button class="chip" type="button" data-category="职场">职场</button>
            <button class="chip" type="button" data-category="学习">学习</button>
            <button class="chip" type="button" data-category="美妆">美妆</button>
            <button class="chip" type="button" data-category="探店">探店</button>
            <button class="chip" type="button" data-category="家居">家居</button>
            <button class="chip" type="button" data-category="闲置">闲置</button>
          </div>
          <input type="hidden" id="category" value="AI工具">
        </div>

        <div class="field">
          <label for="topic">主题或商品名称</label>
          <input id="topic" autocomplete="off" placeholder="例如：用AI整理小红书文案">
          <div class="error" id="topicError">请先填写主题或商品名称。</div>
        </div>

        <div data-mode-only="rednote">
          <div class="field-row">
            <div class="field">
              <label for="audience">目标读者</label>
              <input id="audience" autocomplete="off" placeholder="例如：刚开始做小红书的新手">
            </div>
            <div class="field">
              <label for="goal">内容目标</label>
              <select id="goal">
                <option>干货教程</option>
                <option>经验分享</option>
                <option>避坑提醒</option>
                <option>产品种草</option>
                <option>使用测评</option>
                <option>商品介绍</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="points">核心要点 <span class="optional">逗号或换行分隔</span></label>
          <textarea id="points" placeholder="例如：先定目标人群；AI只写结构；加入真实细节；发布前删除空话"></textarea>
        </div>

        <div class="field">
          <label for="details">真实信息 <span class="optional">不虚构经历</span></label>
          <textarea id="details" placeholder="例如：整理包包含标题、开头、正文和结尾模板，可以编辑"></textarea>
        </div>

        <div class="field">
          <label for="cautions">限制或注意事项 <span class="optional">选填</span></label>
          <textarea id="cautions" placeholder="例如：模板不能保证爆款，需要替换成自己的细节"></textarea>
        </div>

        <div data-mode-only="rednote">
          <div class="field-row">
            <div class="field">
              <label for="tone">表达风格</label>
              <select id="tone">
                <option>真实自然</option>
                <option>清单干货</option>
                <option>简洁专业</option>
                <option>轻松口语</option>
              </select>
            </div>
            <div class="field">
              <label for="length">笔记长度</label>
              <select id="length">
                <option value="short">简短</option>
                <option value="standard" selected>标准</option>
                <option value="detailed">详细</option>
              </select>
            </div>
          </div>

          <div class="field-row">
            <div class="field">

      function $(selector, root) {
        return (root || document).querySelector(selector);

      function value(id) {

      function cleanSpaces(input) {
        return String(input || "").replace(/\s+/g, " ").trim();
      }

      function pointsFrom(input, limit) {
        var seen = {};
        return String(input || "")
          .split(/[，,、；;\n]+/)
          .map(function (item) { return cleanSpaces(item); })
          .filter(function (item) {
            var key = outputKey(item);
            if (!key || seen[key]) return false;
            seen[key] = true;
            return true;
          })
          .slice(0, limit || 6);
      }

      function numberValue(input) {
        var cleaned = String(input || "").replace(/[^\d.]/g, "");
        if (!cleaned || !Number.isFinite(Number(cleaned))) return "";
        return String(Number(cleaned));
      }

      function hash(input) {
        var total = 0;
        var text = String(input || "");
        for (var i = 0; i < text.length; i += 1) {
          total = (total * 31 + text.charCodeAt(i)) >>> 0;
        }
        return total;
      }

      function pick(list, offset, seed) {
        if (!list.length) return "";
        return list[(seed + state.generation + (offset || 0)) % list.length];
      }

      function compact(input, max) {
        var text = cleanSpaces(input);
        return text.length > max ? text.slice(0, max - 1) + "…" : text;
      }

      function naturalize(input) {
        var text = String(input || "");
        var replacements = [
          [/在这个快节奏的时代[，,]?/g, ""],
          [/随着[^，。；]{0,18}(?:发展|普及)[，,]?/g, ""],
          [/今天(?:就)?来为大家分享/g, "这次整理"],
          [/众所周知[，,]?/g, ""],
          [/总而言之[，,]?/g, "最后"],
          [/不容错过/g, "可以参考"],
          [/赋能/g, "帮助"],
          [/助力/g, "帮助"],
          [/首先([^。]{0,60})其次/g, "$1接着"]
        ];
        replacements.forEach(function (entry) {
          text = text.replace(entry[0], entry[1]);
        });
        return text.replace(/[ \t]{2,}/g, " ").replace(/\n{3,}/g, "\n\n").trim();
      }

      function filterClaims(input) {
        var text = String(input || "");
        text = text.replace(/不能保证爆款/g, "__SAFE_NO_VIRAL__");
        var replacements = [
          [/保证爆款/g, "不能保证爆款"],
          [/轻松月入[^\s，。；]*/g, "实际效果因人而异"],
          [/百分百/g, "尽量"],
          [/100%/g, "尽量"],
          [/全网最低/g, "当前标价"],
          [/闭眼入/g, "按需选择"],
          [/必买/g, "可以考虑"],
          [/绝对有效/g, "可以尝试"]
        ];
        replacements.forEach(function (entry) {
          text = text.replace(entry[0], entry[1]);
        });
        return text.replace(/__SAFE_NO_VIRAL__/g, "不能保证爆款");
      }

      function polish(input, data) {
        var text = String(input || "");
        if (data.naturalMode) text = naturalize(text);
        if (data.safeMode) text = filterClaims(text);
        return text.trim();
      }

      function collectData() {
        var preset = categoryData[state.category] || categoryData["AI工具"];
        return {
          mode: state.mode,
          category: state.category,
          topic: value("topic"),
          audience: value("audience") || preset.audience,
          goal: value("goal") || "干货教程",

          tone: value("tone") || "真实自然",

          price: numberValue(value("price")),
          condition: value("condition") || "正常使用痕迹",
          sellPrice: numberValue(value("sellPrice")),
          city: value("city"),
          trade: value("trade") || "只走平台，支持邮寄",
          naturalMode: $("#naturalMode").checked,
          safeMode: $("#safeMode").checked,
          tags: preset.tags.slice()

      }

      function defaultPoints(data) {
        if (data.points.length) return data.points;
        if (data.mode === "xianyu") {
          return ["商品信息按实物填写", "使用状态已经说明", "支持平台内沟通交易"];
        }
        return ["先明确写给谁看", "用具体细节替代空话", "发布前检查承诺和边界"];
      }

      function outputKey(input) {
        return cleanSpaces(input)
          .toLowerCase()
          .replace(/[0-9０-９]+/g, "")
          .replace(/[，。！？!?；;：:、,.\s#“”"'「」【】()[\]（）《》]/g, "");
      }

      function uniqueTextLines(input, reserved) {
        var seen = {};
        (reserved || []).forEach(function (item) {
          var reservedKey = outputKey(item);
          if (reservedKey) seen[reservedKey] = true;
        });
        return String(input || "")
          .split(/\n+/)
          .map(function (item) { return cleanSpaces(item); })
          .filter(function (item) {
            var key = outputKey(item);
            if (!key || seen[key]) return false;
            seen[key] = true;
            return true;
          });
      }

      function uniqueTextBlocks(input, reserved) {
        var seen = {};
        (reserved || []).forEach(function (item) {
          var reservedKey = outputKey(item);
          if (reservedKey) seen[reservedKey] = true;
        });
        return String(input || "")
          .split(/\n{2,}/)
          .map(function (item) { return item.trim(); })
          .filter(function (item) {
            var key = outputKey(item);
            if (!key || seen[key]) return false;
            seen[key] = true;
            return true;
          });
      }

        var text = cleanSpaces(input).replace(/[。！？!?；;]+$/g, "");

            "很多经验分享看起来很顺，是因为把踩过的弯路也写出来了，而不是只留下最后一句结论。",
            "如果你正在做" + data.topic + "，可以先对照自己的场景，不用急着把别人的方法原样搬过来。",
            "我会把这篇当作记录，而不是标准答案：有些内容适合参考，有些内容必须自己验证。"
          ],
          "避坑提醒": [
            "最麻烦的坑往往不是明显错误，而是看起来合理、实际却缺少适用条件的说法。",
            "做" + data.topic + "之前，先问自己一句：这个结论有没有具体场景和依据？",
            "如果一篇内容只告诉你“不要做什么”，却不说为什么和怎么改，读完还是很难执行。",
            "下面这些提醒不一定适合所有人，但可以用来检查自己有没有漏掉关键条件。"
          ],
          "产品种草": [
            "买之前最想知道的通常不是“好不好”，而是它在自己的场景里到底能不能派上用场。",
            "关于" + data.topic + "，我会把优点和限制放在同一篇里，省得只看单方面推荐。",
            "如果你只是被某个卖点吸引，建议先停一下，看看它是否真的对应你的日常需求。",
            "种草可以有，但先把不适合的情况说清楚，反而更容易做决定。"
          ],
          "使用测评": [
            "一条“值得买”并不能替代测评，真正有用的是它在什么条件下表现好、什么情况下会失望。",
            "这次把" + data.topic + "拆成几个观察维度，优点和限制都按同一套标准说。",
            "如果你在看" + data.topic + "，先别只盯着最终评分，评价依据比分数更重要。",
            "同一个产品，不同人的使用结果可能完全不同，所以场景一定要写在结论前面。"
          ],
          "商品介绍": [
            "看商品介绍时，先确认自己需要解决的问题，再看这件商品具体能提供什么。",
            "一篇清楚的商品介绍，不应该只列卖点，还要把适用条件、交付内容和限制写明白。",
            "如果你正在找" + data.topic + "，下面这些信息比一句“很不错”更值得先看。",
            "买不买可以慢一点，先确认信息是否完整，后面的选择会更轻松。"
          ]
        };
        var pool = groups[data.goal] || groups["干货教程"];
        var ordered = [];
        for (var i = 0; i < pool.length; i += 1) {
          ordered.push(pool[(seed + i + 1) % pool.length]);
        }
        return uniqueTextBlocks(ordered, [primaryOpening]).slice(0, 3);
      }

      function pointAdvice(data, point, index) {
        var kind = /读者|人群|用户|对象/.test(point) ? "audience"
          : /标题|开头|封面|首图/.test(point) ? "headline"
            : /真实|细节|经历|数据|时间|数量|价格/.test(point) ? "evidence"
              : /步骤|流程|顺序|方法|操作|执行/.test(point) ? "action"
                : /产品|功能|卖点|使用|体验|效果/.test(point) ? "feature"
                  : /限制|注意|风险|避坑|问题|缺点/.test(point) ? "boundary"
                    : "general";
        var advice = {
          audience: "先写清楚对象、场景和他现在卡在哪里，后面的例子才不会只对自己有用。",
          headline: "保留主题词，再放进一个具体场景、数量或结果范围；不要用“最好”“必看”这类空泛词代替内容。",
          evidence: "补充时间、数量、价格、使用频率或前后差异中的至少一项；没有验证过的信息就直接说明，不要补造。",
          action: "把这件事写成一个能执行的动作，并补上做完后应该看到什么，读者才知道下一步怎么走。",
          feature: "不要只写功能或卖点，要把它翻译成使用场景：什么时候有用、解决什么、什么情况下用不上。",
          boundary: "把适用条件和限制一起写出来，避免读者只记住一个结论，发布后才发现预期不一致。",
          general: "把这一点写成“场景、动作、结果”三部分，读者看完应该知道自己能不能照着做。"
        }[kind];
        var endings = {
          "干货教程": ["先完成这一项，再进入下一步，信息不会混在一起。", "发布前可以用这一点反向检查正文是否具体。", "如果读者看不懂，优先补对象、动作和结果。"],
          "经验分享": ["这样留下的才是过程，不只是一个看起来漂亮的结论。", "有了这个细节，别人才能判断它和自己的情况像不像。", "不相关的内容可以删掉，真实记录不需要写得很满。"],
          "避坑提醒": ["发现条件不满足时，宁可暂停，也不要为了赶进度硬做。", "提前核对这一项，通常比发布后反复修改省事。", "不确定的地方说清边界，比给出一个过度肯定的答案更稳妥。"],
          "产品种草": ["如果这个场景和你无关，就不必因为别人的推荐勉强选择。", "具体使用条件写出来，推荐会比单纯夸优点更可信。", "把不适合的人也说清楚，读者反而更容易判断。"],
          "使用测评": ["不同使用条件可能得到不同结果，这里只把观察依据留下来。", "把优点和限制放在同一处，判断会比单看评分更接近实际。", "这部分适合作为参考，不应该替代你自己的实际体验。"],
          "商品介绍": ["信息越明确，后续沟通和选择都会更省时间。", "买前先确认这一点，再决定要不要继续了解。", "如果条件不符合，直接跳过也比买错后再后悔更好。"]
        }[data.goal] || [];
        return advice + " " + (endings[index % endings.length] || "写清楚之后再进入下一步。" );
      }

      function rednotePointCopy(data, point, index) {
        var labelsByGoal = {
          "干货教程": "第" + (index + 1) + "步",
          "经验分享": "记录点" + (index + 1),
          "避坑提醒": "提醒" + (index + 1),
          "产品种草": "使用场景" + (index + 1),
          "使用测评": "观察维度" + (index + 1),
          "商品介绍": "信息" + (index + 1)
        };
        var pointText = cleanSpaces(point).replace(/[。！？!?；;]+$/g, "");
        return labelsByGoal[data.goal] + "｜" + pointText + "\n" + pointAdvice(data, pointText, index);
      }

      function rednoteConclusion(data) {
        return {
          "干货教程": "把上面的动作替换成自己的主题和素材后再发布，尤其检查对象、数字和边界是否真实。",
          "经验分享": "这类内容最有价值的地方，不是把结果说得多漂亮，而是把过程里的判断和限制留下来。",
          "避坑提醒": "发布前再检查一遍：每个提醒后面有没有原因、场景和处理方式；没有依据的内容直接删掉。",
          "产品种草": "所以，是否适合不看别人说得多好，而看它是否对应你的使用场景、预算和接受的限制。",
          "使用测评": "综合这些观察，这份记录适合帮助你做初步判断，不能替代你自己的实际使用。",
          "商品介绍": "如果这些信息和你的需求对得上，再继续了解；如果关键条件不符合，直接跳过也没关系。"
        }[data.goal] || "发布前把示例替换成自己的真实信息，再检查内容是否具体。";
      }

      function rednoteBody(data, primaryTitle, opening) {
        var points = defaultPoints(data);
        var sections = [primaryTitle, opening];

        points.forEach(function (point, index) {
          sections.push(rednotePointCopy(data, point, index));
        });

        if (data.details) {
          sections.push("真实记录\n" + ensureSentence(data.details));
        }

        if (data.cautions) {
          sections.push("需要提前说清\n" + ensureSentence(data.cautions));
        }

        sections.push(rednoteConclusion(data));

        var price = data.price ? "，当前标价" + data.price + "元" : "";
        var ctaText = {
          "收藏备用": "先收藏，真正发布前把示例换成自己的经历、数据和图片。",
          "评论交流": "如果你正在做同一件事，评论里可以说说自己卡在哪个环节。",
          "查看店铺商品": "完整目录和预览可以在店铺商品页查看" + price + "，按需选择就好。",
          "不加引导": ""
        }[data.cta] || "";
        if (ctaText) sections.push(ctaText);

        return uniqueTextBlocks(sections).join("\n\n");
      }

      function rednoteExtras(data) {
        var topicTag = cleanSpaces(data.topic).replace(/[^\u4e00-\u9fa5A-Za-z0-9]/g, "").slice(0, 12);
        var goalTags = {
          "干货教程": ["教程分享", "方法整理"],
          "经验分享": ["经验记录", "真实分享"],
          "避坑提醒": ["避坑指南", "新手避坑"],
          "产品种草": ["好物分享", "种草记录"],
          "使用测评": ["真实测评", "使用体验"],
          "商品介绍": ["商品信息", "购买参考"]
        }[data.goal] || [];
        var seen = {};
        var tags = [topicTag].concat(goalTags, data.tags).map(function (tag) {
          return cleanSpaces(tag).replace(/[^\u4e00-\u9fa5A-Za-z0-9]/g, "");
        }).filter(function (tag) {
          var key = outputKey(tag);
          if (!key || tag.length < 2 || seen[key]) return false;
          seen[key] = true;
          return true;
        }).slice(0, 5);
        return tags.map(function (tag) { return "#" + tag; }).join(" ");
      }

      function rednoteComment(data) {
        var price = data.price ? "，当前价格" + data.price + "元" : "";
        if (data.cta === "查看店铺商品") {
          return "想看完整目录和预览，可以去商品页查看" + price + "。先确认内容适不适合自己，再决定要不要选。";
        }
        if (data.cta === "评论交流") {
          return "你现在最想看" + data.topic + "的哪一部分？可以把具体场景留在评论里。";
        }
        if (data.cta === "收藏备用") {
          return "如果之后还会遇到同类问题，可以先收藏；真正发布时记得替换成自己的信息。";
        }
        return "补充说明：" + (data.cautions || "示例内容需要结合自己的真实情况修改。");
      }

      function generateRednote(data) {
        var seed = hash(data.topic + data.audience + data.goal + data.category);
        var titles = rednoteTitles(data, seed);
        var primaryTitle = titles[0] || data.topic;
        var opening = rednoteOpening(data, defaultPoints(data), seed);
        var hooks = rednoteHooks(data, seed, opening);
        var extras = rednoteExtras(data);
        return {
          primaryTitle: primaryTitle,
          titles: titles.slice(1).map(function (item, index) { return (index + 1) + ". " + item; }).join("\n"),
          hooks: hooks.join("\n\n"),
          extras: extras,
          body: rednoteBody(data, primaryTitle, opening),
          comment: rednoteComment(data)
        };
      }

      function generateXianyu(data) {
        var points = defaultPoints(data);
        var price = data.sellPrice ? data.sellPrice + "元" : "价格可聊";
        var city = data.city ? data.city + "同城" : "";
        var seed = hash(data.topic + data.condition);
        var titlePool = [
          data.topic + " " + data.condition + " " + price + "自用转让",
          "自用闲置 " + data.topic + " 瑕疵已说明",
          city + " " + data.topic + " 状态如实可直接拍",
          data.topic + " " + points[0] + " " + price,
          "诚心出" + data.topic + " " + data.condition + "走平台",
          data.topic + "闲置转让 配件和细节可补图"
        ];
        var titles = [];
        for (var i = 0; i < 5; i += 1) {
          titles.push(compact(pick(titlePool, i, seed), 40));
        }
        titles = Array.from(new Set(titles)).slice(0, 5);

        var hooks = [
          "自用闲置，" + data.condition + "，主要特点是：" + points.join("、") + "。",
          "商品信息、使用状态和注意事项都按实物填写，价格" + price + "。",
          data.topic + "还在，支持平台内沟通，想看细节可以补图。"
        ];

        var detail = [
          "【商品】" + data.topic,
          "【成色】" + data.condition,
          "【价格】" + price,
          "【卖点】\n" + points.map(function (item, index) {
            return (index + 1) + ". " + item;
          }).join("\n"),
          "【真实情况】\n" + (data.details || "商品状态以实物图片和沟通内容为准。"),
          "【瑕疵或注意事项】\n" + (data.cautions || "正常使用痕迹，细节可以提前确认。"),
          "【交易方式】\n" + data.trade + (data.city ? "，" + data.city + "同城可沟通面交。" : "。"),
          "默认只走平台，不接受私下转账。介意成色、价格或细节的请先确认清楚。"
        ].join("\n\n");

        var extras = [
          "问：还在吗？\n答：在的，" + data.topic + "还在，可以先确认细节再拍。",
          "问：能便宜吗？\n答：" + (data.sellPrice ? "价格已经结合成色定过，诚心要可以正常沟通。" : "可以正常沟通价格，希望是诚心要。"),
          "问：有什么瑕疵？\n答：" + (data.cautions || "正常使用痕迹，可以补细节图。"),
          "问：可以面交吗？\n答：" + (data.city ? data.city + "可以沟通面交时间和地点。" : "需要看双方距离，邮寄也只走平台。")
        ].join("\n\n");

        var comment = "交易说明：" + data.trade + "。不私下转账，不脱离平台交易；商品状态以详情、图片和双方沟通内容为准。";

        return {
          titles: titles.map(function (item, index) { return (index + 1) + ". " + item; }).join("\n"),
          hooks: hooks.join("\n\n"),
          extras: extras,
          body: detail,
          comment: comment
        };
      }

      function dedupeGenerated(generated) {
        var bodyBlocks = uniqueTextBlocks(generated.body);
        generated.body = bodyBlocks.join("\n\n");

        var used = bodyBlocks.slice();
        generated.titles = uniqueTextLines(generated.titles, used).join("\n");
        used = used.concat(uniqueTextLines(generated.titles));
        generated.hooks = uniqueTextBlocks(generated.hooks, used).join("\n\n");
        used = used.concat(uniqueTextBlocks(generated.hooks));
        generated.extras = uniqueTextLines(generated.extras.replace(/\s+(?=#)/g, "\n"), used).join(" ");
        used = used.concat(uniqueTextLines(generated.extras.replace(/\s+(?=#)/g, "\n")));

        var comment = cleanSpaces(generated.comment);
        var commentKey = outputKey(comment);
        if (used.some(function (item) { return outputKey(item) === commentKey; })) {
          generated.comment = "补充说明：请结合自己的真实情况核对后再发布。";
        }
        return generated;
      }

      function applyPolish(generated, data) {
        Object.keys(generated).forEach(function (key) {
          generated[key] = polish(generated[key], data);
        });
        return generated;
      }

      function buildAll(generated) {
        var currentLabels = labels[state.mode];
        return [
          "【" + currentLabels.titles + "】\n" + generated.titles,
          "【" + currentLabels.hooks + "】\n" + generated.hooks,
          "【" + currentLabels.body + "】\n" + generated.body,
          "【" + currentLabels.extras + "】\n" + generated.extras,
          "【" + currentLabels.comment + "】\n" + generated.comment
        ].join("\n\n");
      }

      function buildPublishable(generated) {
        return uniqueTextBlocks([generated.body, generated.extras].filter(Boolean).join("\n\n")).join("\n\n");
      }

      function renderGenerated(generated) {
        ["titles", "hooks", "extras", "body", "comment"].forEach(function (key) {
          var node = $("#" + key);
          node.textContent = generated[key];
          node.classList.remove("placeholder");
        });
      }

      function generate() {
        var topicNode = $("#topic");
        var topic = value("topic");
        topicNode.setAttribute("aria-invalid", topic ? "false" : "true");
        $("#topicError").classList.toggle("show", !topic);
        if (!topic) {
          topicNode.focus();
          showToast("先填写主题或商品名称");
          return;
        }

        state.generation += 1;
        var data = collectData();
        var generated = state.mode === "rednote" ? generateRednote(data) : generateXianyu(data);
        generated = applyPolish(generated, data);
        generated = dedupeGenerated(generated);
        generated.all = buildAll(generated);

        state.current = {
          id: Date.now(),
          mode: state.mode,
          category: state.category,
          data: data,
          form: serializeForm(),
          generated: generated,
          createdAt: new Date().toISOString()
        };

        renderGenerated(generated);
        $("#resultMeta").textContent = data.topic + " · " + (state.mode === "rednote" ? data.goal : data.condition) + " · 刚刚生成";
        saveHistory(state.current);
        renderHistory();
        saveDraft();
        showToast(state.mode === "rednote" ? "完整小红书文案已生成" : "闲鱼文案已生成");

        if (window.innerWidth <= 820) {
          $(".results-area").scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      function updateLabels() {
        var currentLabels = labels[state.mode];
        $("#titlesLabel").textContent = currentLabels.titles;
        $("#hooksLabel").textContent = currentLabels.hooks;
        $("#extrasLabel").textContent = currentLabels.extras;
        $("#bodyLabel").textContent = currentLabels.body;
        $("#commentLabel").textContent = currentLabels.comment;
      }

      function resetOutputs() {
        var currentPlaceholders = placeholders[state.mode];
        Object.keys(currentPlaceholders).forEach(function (key) {
          var node = $("#" + key);
          node.textContent = currentPlaceholders[key];
          node.classList.add("placeholder");
        });
        $("#resultMeta").textContent = "等待输入素材";
        state.current = null;
      }

      function setMode(mode, options) {
        state.mode = mode === "xianyu" ? "xianyu" : "rednote";
        $$("[data-mode]").forEach(function (button) {
          var active = button.dataset.mode === state.mode;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", active ? "true" : "false");
        });
        $$("[data-mode-only]").forEach(function (node) {
          node.hidden = node.dataset.modeOnly !== state.mode;
        });
        updateLabels();
        if (!options || !options.keepResults) resetOutputs();
        if (!options || !options.skipSave) saveDraft();
      }

      function setCategory(category) {
        state.category = categoryData[category] ? category : "AI工具";
        $("#category").value = state.category;
        $$("#categoryChips .chip").forEach(function (chip) {
          chip.classList.toggle("active", chip.dataset.category === state.category);
        });
      }

      function fillSample() {
        if (state.mode === "rednote") {
          setCategory("AI工具");
          $("#topic").value = "用AI整理小红书文案";
          $("#audience").value = "刚开始做小红书、每次写文案都卡住的新手";
          $("#goal").value = "干货教程";
          $("#points").value = "先确定目标读者\n让AI只生成标题和结构\n加入自己的真实信息\n删除空话和夸张承诺";
          $("#details").value = "资料包按照标题、开头、正文结构和结尾互动分类，可直接编辑；完整版本放在店铺商品页";
          $("#cautions").value = "模板不能保证爆款，需要替换成自己的信息和细节";
          $("#tone").value = "真实自然";
          $("#length").value = "standard";
          $("#cta").value = "查看店铺商品";
          $("#price").value = "19.9";
        } else {
          setCategory("闲置");
          $("#topic").value = "Sony WH-1000XM5降噪耳机";
          $("#points").value = "自用为主\n降噪和连接正常\n盒子和充电线都在";
          $("#details").value = "去年双11入手，主要用于上下班通勤";
          $("#cautions").value = "外壳有轻微使用痕迹，不影响连接和降噪";
          $("#condition").value = "95新";
          $("#sellPrice").value = "1399";
          $("#city").value = "上海";
          $("#trade").value = "只走平台，支持邮寄";
        }
        $("#topic").setAttribute("aria-invalid", "false");
        $("#topicError").classList.remove("show");
        generate();
      }

      function serializeForm() {
        var ids = [
          "topic", "audience", "goal", "points", "details", "cautions", "tone",
          "length", "cta", "price", "condition", "sellPrice", "city", "trade"
        ];
        var form = {
          mode: state.mode,
          category: state.category,
          naturalMode: $("#naturalMode").checked,
          safeMode: $("#safeMode").checked
        };
        ids.forEach(function (id) {
          form[id] = $("#" + id).value;
        });
        return form;
      }

      function restoreForm(form) {
        if (!form) return;
        setMode(form.mode || "rednote", { keepResults: true, skipSave: true });
        setCategory(form.category || "AI工具");
        Object.keys(form).forEach(function (key) {
          var node = $("#" + key);
          if (!node || key === "naturalMode" || key === "safeMode") return;
          node.value = form[key] == null ? "" : form[key];
        });
        $("#naturalMode").checked = form.naturalMode !== false;
        $("#safeMode").checked = form.safeMode !== false;
        saveDraft();
      }

      function clearForm() {
        $("#copyForm").reset();
        setCategory("AI工具");
        $("#naturalMode").checked = true;
        $("#safeMode").checked = true;
        $("#topic").setAttribute("aria-invalid", "false");
        $("#topicError").classList.remove("show");
        resetOutputs();
        try {
          localStorage.removeItem(DRAFT_KEY);
        } catch (error) {
          // Local storage may be unavailable in restrictive local-file modes.
        }
        showToast("输入内容已清空");
      }

      function saveDraft() {
        try {
          localStorage.setItem(DRAFT_KEY, JSON.stringify(serializeForm()));
        } catch (error) {
          // The tool still works without draft persistence.
        }
      }

      function loadDraft() {
        try {
          var draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");
          if (draft) restoreForm(draft);
        } catch (error) {
          // Ignore malformed or unavailable storage.
        }
      }

      function getHistory() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch (error) {
          return [];
        }
      }

      function saveHistory(item) {
        try {
          var list = getHistory();
          var next = [item].concat(list).slice(0, 9);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        } catch (error) {
          showToast("当前浏览器未保存历史，但不影响生成");
        }
      }

      function renderHistory() {
        var root = $("#historyList");
        var list = getHistory();
        root.innerHTML = "";
        if (!list.length) {
          var empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "生成后会在当前浏览器保存最近9条记录";
          root.appendChild(empty);
          return;
        }

        list.forEach(function (item) {
          var card = document.createElement("article");
          card.className = "history-item";

          var title = document.createElement("strong");
          title.textContent = item.data && item.data.topic ? item.data.topic : "未命名文案";

          var meta = document.createElement("span");
          var time = new Date(item.createdAt).toLocaleString("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          });
          meta.textContent = (item.mode === "xianyu" ? "闲鱼" : "小红书") + " · " + (item.category || "") + " · " + time;

          var actions = document.createElement("div");
          actions.className = "history-actions";

          var restore = document.createElement("button");
          restore.type = "button";
          restore.textContent = "恢复";
          restore.addEventListener("click", function () {
            restoreForm(item.form);
            state.current = item;
            renderGenerated(item.generated);
            $("#resultMeta").textContent = (item.data.topic || "文案") + " · 已恢复";
            window.scrollTo({ top: 0, behavior: "smooth" });
            showToast("历史文案已恢复");
          });

          var copy = document.createElement("button");
          copy.type = "button";
          copy.textContent = "复制";
          copy.addEventListener("click", function () {
            copyText(item.generated.all || buildAll(item.generated));
          });

          actions.appendChild(restore);
          actions.appendChild(copy);
          card.appendChild(title);
          card.appendChild(meta);
          card.appendChild(actions);
          root.appendChild(card);
        });
      }

      function syncEditedResult(key) {
        if (!state.current) return;
        state.current.generated[key] = $("#" + key).textContent.trim();
        state.current.generated.all = buildAll(state.current.generated);
      }

      async function copyText(input) {
        var text = String(input || "").trim();
        if (!text) {
          showToast("暂无内容可复制");
          return;
        }

        var copied = false;
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            copied = true;
          }
        } catch (error) {
          copied = false;
        }

        if (!copied) {
          var area = document.createElement("textarea");
          area.value = text;
          area.setAttribute("readonly", "");
          area.style.position = "fixed";
          area.style.left = "-9999px";
          document.body.appendChild(area);
          area.focus();
          area.select();
          try {
            copied = document.execCommand("copy");
          } catch (error) {
            copied = false;
          }
          area.remove();
        }

        window.__lastCopiedText = copied ? text : "";
        showToast(copied ? "已复制到剪贴板" : "复制受限，请长按选择内容");
      }

      function copyAll() {
        if (!state.current) {
          showToast("请先生成文案");
          return;
        }
        ["titles", "hooks", "extras", "body", "comment"].forEach(syncEditedResult);
        copyText(state.current.generated.all);
      }

      function copyBody() {
        if (!state.current) {
          showToast("请先生成文案");
          return;
        }
        syncEditedResult("body");
        copyText(buildPublishable(state.current.generated));
      }

      function currentFile() {
        ["titles", "hooks", "extras", "body", "comment"].forEach(syncEditedResult);
        var filename = (state.current.data.topic || "文案") + "-" + (state.mode === "rednote" ? "小红书" : "闲鱼") + ".txt";
        filename = filename.replace(/[\\/:*?"<>|]/g, "-");
        return {
          filename: filename,
          file: new File([state.current.generated.all], filename, { type: "text/plain;charset=utf-8" })
        };
      }

      function isAppleMobile() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      }

      async function shareApp() {
        var shareData = {
          title: "小红书文案工作台",
          text: "打开网页即可生成小红书和闲鱼文案",
          url: window.location.href
        };
        if (navigator.share) {
          try {
            await navigator.share(shareData);
            showToast("已打开分享");
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
          }
        }
        copyText(window.location.href);
      }

      async function shareResult() {
        if (!state.current) {
          showToast("请先生成文案");
          return;
        }
        var output = currentFile();
        if (navigator.share) {
          try {
            if (navigator.canShare && navigator.canShare({ files: [output.file] })) {
              await navigator.share({
                title: output.filename,
                text: "由小红书文案工作台生成",
                files: [output.file]
              });
            } else {
              await navigator.share({
                title: output.filename,
                text: state.current.generated.all
              });
            }
            showToast("已打开分享");
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
          }
        }
        copyText(state.current.generated.all);
      }

      async function exportTxt() {
        if (!state.current) {
          showToast("请先生成文案");
          return;
        }
        var output = currentFile();
        if (isAppleMobile() && navigator.share && navigator.canShare && navigator.canShare({ files: [output.file] })) {
          try {
            await navigator.share({
              title: output.filename,
              files: [output.file]
            });
            showToast("已打开保存与分享");
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
          }
        }

        var blob = output.file;
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = output.filename;
        link.style.display = "none";
        document.body.appendChild(link);
        window.__lastExportFile = output.filename;
        link.click();
        setTimeout(function () {
          link.remove();
          URL.revokeObjectURL(url);
        }, 1000);
        showToast("TXT已导出");
      }

      var toastTimer;
      function showToast(message) {
        var node = $("#toast");
        node.textContent = message;
        node.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          node.classList.remove("show");
        }, 1900);
      }

      $$("[data-mode]").forEach(function (button) {
        button.addEventListener("click", function () {
          setMode(button.dataset.mode);
        });
      });

      $$("#categoryChips .chip").forEach(function (button) {
        button.addEventListener("click", function () {
          setCategory(button.dataset.category);
          saveDraft();
        });
      });

      $$("[data-generate]").forEach(function (button) {
        button.addEventListener("click", generate);
      });

      $$("[data-fill-sample]").forEach(function (button) {
        button.addEventListener("click", fillSample);
      });

      $$("[data-clear]").forEach(function (button) {
        button.addEventListener("click", clearForm);
      });

      $$("[data-export]").forEach(function (button) {
        button.addEventListener("click", exportTxt);
      });

      $$("[data-share-app]").forEach(function (button) {
        button.addEventListener("click", shareApp);
      });

      $$("[data-share-result]").forEach(function (button) {
        button.addEventListener("click", shareResult);
      });

      $$("[data-copy-all]").forEach(function (button) {
        button.addEventListener("click", copyAll);
      });

      $$("[data-copy-body]").forEach(function (button) {
        button.addEventListener("click", copyBody);
      });

      $$("[data-copy-target]").forEach(function (button) {
        button.addEventListener("click", function () {
          var key = button.dataset.copyTarget;
          if (!state.current) {
            showToast("请先生成文案");
            return;
          }
          syncEditedResult(key);
          copyText(state.current.generated[key]);
        });
      });

      $$(".output-content").forEach(function (node) {
        node.addEventListener("input", function () {
          node.classList.remove("placeholder");
          syncEditedResult(node.id);
        });
      });

      $$("[data-scroll]").forEach(function (button) {
        button.addEventListener("click", function () {
          var target = $(button.dataset.scroll);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });

      $("[data-clear-history]").addEventListener("click", function () {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          // Ignore storage restrictions.
        }
        renderHistory();
        showToast("本地历史已清空");
      });

      $("#copyForm").addEventListener("input", function (event) {
        if (event.target.id === "topic" && value("topic")) {
          $("#topic").setAttribute("aria-invalid", "false");
          $("#topicError").classList.remove("show");
        }
        saveDraft();
      });

      $("#copyForm").addEventListener("change", saveDraft);

      if (window.visualViewport) {
        var updateKeyboardState = function () {
          document.body.classList.toggle(
            "keyboard-open",
            window.visualViewport.height < window.innerHeight * 0.72
          );
        };
        window.visualViewport.addEventListener("resize", updateKeyboardState);
        window.visualViewport.addEventListener("scroll", updateKeyboardState);
      }

      if ("serviceWorker" in navigator && /^(https?:)$/.test(window.location.protocol)) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {
            // Online use still works if offline caching is unavailable.
          });
        });
        var refreshingForUpdate = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (refreshingForUpdate) return;
          refreshingForUpdate = true;
          window.location.reload();
        });
      }

      setMode("rednote", { keepResults: true, skipSave: true });
      loadDraft();
      updateLabels();
      resetOutputs();
      renderHistory();
    }());
  </script>
</body>
</html>
